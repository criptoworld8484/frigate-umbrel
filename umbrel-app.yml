manifestVersion: 1.1
id: frigate
category: bitcoin
name: Frigate
version: 1.5.3
tagline: Electrum server for Silent Payments
description: >
  Frigate is an Electrum server for Silent Payments (BIP352). It performs
  Silent Payments scanning server-side using ephemeral client keys, returning
  discovered transactions to clients over an extension to the Electrum JSON-RPC
  protocol.

  This package is configured for Bitcoin testnet4.

  Note: This is the Sparrow Wallet implementation of the Electrum server for
  Silent Payments, not to be confused with the home security NVR software
  also called Frigate.
developer: sparrowwallet
website: https://github.com/sparrowwallet/frigate
repo: https://github.com/sparrowwallet/frigate
support: https://github.com/sparrowwallet/frigate/discussions
port: 5005
gallery: []
path: ""
defaultPassword: ""
dependencies:
  - bitcoin
releaseNotes: >
  Initial release for Umbrel with testnet4 support.
  Frigate is an Electrum server for Silent Payments (BIP352) supporting
  GPU-accelerated scanning with CUDA, Metal, and OpenCL backends.
submitter: community
submission: https://github.com/getumbrel/umbrel-apps