version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: frigate_frigate_1
      APP_PORT: 5000
      PROXY_AUTH_ADD: "false"

  frigate:
    image: ghcr.io/sparrowwallet/frigate-umbrel:latest
    init: true
    restart: on-failure
    stop_grace_period: 5m
    user: "1000:1000"
    ports:
      - "${APP_FRIGATE_NODE_PORT}:50001"
      - "${APP_FRIGATE_SSL_PORT}:50002"
    volumes:
      - "${APP_DATA_DIR}/data/frigate:/data"
      - "${APP_BITCOIN_DATA_DIR}:/bitcoin:ro"
    environment:
      FRIGATE_HOME: /data
      FRIGATE_NETWORK: testnet4
      BITCOIN_RPC_HOST: "${APP_BITCOIN_NODE_IP}"
      BITCOIN_RPC_PORT: "${APP_BITCOIN_RPC_PORT}"
      BITCOIN_RPC_USER: "${APP_BITCOIN_RPC_USER}"
      BITCOIN_RPC_PASS: "${APP_BITCOIN_RPC_PASS}"
      BITCOIN_DATA_DIR: "/bitcoin"
      ZMQ_SEQUENCE_ENDPOINT: "tcp://${APP_BITCOIN_NODE_IP}:28336"
      BACKEND_ELECTRUM_SERVER: "tcp://${APP_ELECTRS_NODE_IP}:${APP_ELECTRS_NODE_PORT}"
      FRIGATE_TCP: "tcp://0.0.0.0:50001"
      FRIGATE_SSL: "ssl://0.0.0.0:50002"
      FRIGATE_SSL_CERT: "/data/cert.pem"
      FRIGATE_SSL_KEY: "/data/key.pem"
      FRIGATE_HOST: "${DEVICE_DOMAIN_NAME}"
    networks:
      default:
        ipv4_address: $APP_FRIGATE_IP

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"

networks:
  default:
    ipv4_address: $APP_FRIGATE_IP